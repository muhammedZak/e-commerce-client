<?xml version="1.0" encoding="UTF-8"?>
<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for bag -->
    <linearGradient id="bagGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ED957"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>

    <!-- Gradient for text -->
    <linearGradient id="textGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Shopping Bag Icon -->
  <g filter="url(#shadow)">
    <!-- Bag body -->
    <path d="M20 40 Q20 25 35 25 L70 25 Q85 25 85 40 L85 90 Q85 100 75 100 L30 100 Q20 100 20 90 Z"
          fill="url(#bagGradient)"/>

    <!-- Bag handle -->
    <path d="M35 40 Q52 10 70 40"
          stroke="#E6F4EA"
          stroke-width="6"
          fill="none"
          stroke-linecap="round"/>

    <!-- Cursor arrow -->
    <polygon points="40,50 40,80 52,72 60,88 70,82 62,66 75,66"
             fill="#FFFFFF"/>
  </g>

  <!-- Brand Name -->
  <text x="110" y="78"
        font-family="Poppins, Segoe UI, Arial, sans-serif"
        font-size="42"
        font-weight="600"
        fill="url(#textGradient)">
    Buyvora
  </text>
</svg>
